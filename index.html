<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftCalc: A sua calculadora online moderna</title>
</head>
<body>
    <div id="main">
        <menu>
            <img src="assets/logo.svg" alt="SoftCalc logo">
            <ul>
                <li alt="padrão">
                    <img src="assets/calc-icon.svg">
                    <h2>Padrão</h2>
                </li>
            </ul>
        </menu>

        <main>
            <div id="viewfinder">
                <h1>0</h1>
            </div>

            <div id="calculator">
                <div id="actions">
                    <div id="empty-box-1"></div>
                    <div id="actions">
                        <button>
                            <img src="assets/delete.svg" alt="Deletar">
                        </button>

                        <button>
                            <h3>CE</h3>
                        </button>
                    </div>
                </div>

                <div id="keys">
                    <button>
                        <h3>%</h3>
                    </button>

                    <button>
                        <h3>1/x</h3>
                    </button>

                    <button>
                        <h3>x²</h3>
                    </button>

                    <button>
                        <img src="assets/square-root.svg" alt="raiz quadrada">
                    </button>

                    <button>
                        <h3>x!</h3>
                    </button>

                    <button>
                        <h3>ln</h3>
                    </button>

                    <button>
                        <h3>log</h3>
                    </button>

                    <button>
                        <h3>/</h3>
                    </button>

                    <button>
                        <h3>7</h3>
                    </button>

                    <button>
                        <h3>8</h3>
                    </button>

                    <button>
                        <h3>9</h3>
                    </button>

                    <button>
                        <h3>*</h3>
                    </button>

                    <button>
                        <h3>4</h3>
                    </button>

                    <button>
                        <h3>5</h3>
                    </button>

                    <button>
                        <h3>6</h3>
                    </button>

                    <button>
                        <h3>-</h3>
                    </button>

                    <button>
                        <h3>1</h3>
                    </button>

                    <button>
                        <h3>2</h3>
                    </button>

                    <button>
                        <h3>3</h3>
                    </button>

                    <button>
                        <h3>+</h3>
                    </button>

                    <button></button>

                    <button>
                        <h3>0</h3>
                    </button>

                    <button>
                        <h3>,</h3>
                    </button>

                    <button id="equal" >
                        <h3>=</h3>
                    </button>
                </div>
            </div>  
        </main>
    </div>

    <aside>
        <div>
            <h2>HISTÓRICO</h2>
        </div>

        <div id="history">
            <h3>1 + 2 = 3</h3>
            <h3>3 x 2 = 6</h3>
        </div>
        
    </aside>
</body>
</html>
