<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftCalc: A sua calculadora online moderna</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/standart.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="main">
        <menu>
            <div id="logo">
                <img src="assets/logo.svg" alt="SoftCalc logo">
            </div>
            
            <ul>
                <li alt="padrão" enabled>
                    <div>
                        <img src="assets/calc-icon.svg">
                        <h2>Padrão</h2>
                    </div>
                </li>
            </ul>
        </menu>

        <main>
            <input type="text" placeholder="0" id="viser">
            

            <div id="calculator">
                <div id="top">
                    <button id="empty-box-1" disabled></button>

                    <div id="actions">
                        <button id="b1">
                            <img src="assets/delete.svg" alt="Deletar" id="delete">
                        </button>

                        <button id="b2">
                            <h3>CE</h3>
                        </button>
                    </div>
                </div>

                <div id="keys">
                    <button id="(">
                        <h3>(</h3>
                    </button>

                    <button id=")">
                        <h3>)</h3>
                    </button>

                    <button id="x²">
                        <h3>x²</h3>
                    </button>

                    <button id="√">
                        <h3>√</h3>
                    </button>

                    <button id="x!">
                        <h3>x!</h3>
                    </button>

                    <button id="ln">
                        <h3>ln</h3>
                    </button>

                    <button id="log">
                        <h3>log</h3>
                    </button>

                    <button id="/">
                        <h3>/</h3>
                    </button>

                    <button id="7">
                        <h3>7</h3>
                    </button>

                    <button id="8">
                        <h3>8</h3>
                    </button>

                    <button id="9">
                        <h3>9</h3>
                    </button>

                    <button id="*">
                        <h3>*</h3>
                    </button>

                    <button id="4">
                        <h3>4</h3>
                    </button>

                    <button id="5">
                        <h3>5</h3>
                    </button>

                    <button id="6">
                        <h3>6</h3>
                    </button>

                    <button id="-">
                        <h3>-</h3>
                    </button>

                    <button id="1">
                        <h3>1</h3>
                    </button>

                    <button id="2">
                        <h3>2</h3>
                    </button>

                    <button id="3">
                        <h3>3</h3>
                    </button>

                    <button id="+">
                        <h3>+</h3>
                    </button>

                    <button disabled></button>

                    <button id="0">
                        <h3>0</h3>
                    </button>

                    <button id=",">
                        <h3>,</h3>
                    </button>

                    <button id="equal" >
                        <h3>=</h3>
                    </button>
                </div>
            </div>  
        </main>
    </div>

    <aside>
        <div id="aside">
            <h2>HISTÓRICO</h2>
        </div>

        <div id="history-field">
            <div id="list"></div>
        </div>
        
    </aside>

<script src="scripts/standart.js"></script>
</body>
</html>
